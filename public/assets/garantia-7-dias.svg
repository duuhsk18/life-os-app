<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="g-bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="60%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </radialGradient>
    <linearGradient id="g-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="g-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Borda externa pontilhada -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- Selo principal -->
  <circle cx="100" cy="100" r="80" fill="url(#g-bg)" stroke="#fff" stroke-width="3" filter="url(#g-shadow)"/>

  <!-- Brilho superior -->
  <circle cx="100" cy="100" r="78" fill="url(#g-shine)" opacity="0.6"/>

  <!-- Borda interna -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.5"/>

  <!-- Texto topo -->
  <text x="100" y="60" text-anchor="middle" fill="#fff"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="11" font-weight="800" letter-spacing="3">GARANTIA</text>

  <!-- Número 7 -->
  <text x="100" y="125" text-anchor="middle" fill="#fff"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="58" font-weight="900">7</text>

  <!-- Texto inferior -->
  <text x="100" y="148" text-anchor="middle" fill="#fff"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="10" font-weight="800" letter-spacing="2">DIAS</text>

  <!-- Subtítulo -->
  <text x="100" y="165" text-anchor="middle" fill="#fff" opacity="0.85"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="7" font-weight="700" letter-spacing="1.5">DEVOLUÇÃO TOTAL</text>
</svg>
