<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="seal-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="seal-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
  </defs>

  <!-- ondulação externa estilo selo -->
  <g transform="translate(100,100)">
    <path d="M 0 -92 L 6 -86 L 14 -88 L 18 -82 L 26 -82 L 28 -76 L 36 -74 L 38 -67 L 46 -64 L 46 -56 L 53 -53 L 53 -46 L 60 -41 L 58 -33 L 64 -28 L 60 -20 L 65 -14 L 60 -7 L 64 0 L 60 7 L 65 14 L 60 20 L 64 28 L 58 33 L 60 41 L 53 46 L 53 53 L 46 56 L 46 64 L 38 67 L 36 74 L 28 76 L 26 82 L 18 82 L 14 88 L 6 86 L 0 92 L -6 86 L -14 88 L -18 82 L -26 82 L -28 76 L -36 74 L -38 67 L -46 64 L -46 56 L -53 53 L -53 46 L -60 41 L -58 33 L -64 28 L -60 20 L -65 14 L -60 7 L -64 0 L -60 -7 L -65 -14 L -60 -20 L -64 -28 L -58 -33 L -60 -41 L -53 -46 L -53 -53 L -46 -56 L -46 -64 L -38 -67 L -36 -74 L -28 -76 L -26 -82 L -18 -82 L -14 -88 L -6 -86 Z"
      fill="url(#seal-ring)" opacity="0.25"/>
  </g>

  <!-- círculo principal -->
  <circle cx="100" cy="100" r="78" fill="url(#seal-bg)" stroke="#fff" stroke-width="3"/>
  <circle cx="100" cy="100" r="68" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- texto curva superior -->
  <path id="curve-top" d="M 30 100 A 70 70 0 0 1 170 100" fill="none"/>
  <text fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="800" letter-spacing="3">
    <textPath xlink:href="#curve-top" startOffset="50%" text-anchor="middle">GARANTIA</textPath>
  </text>

  <!-- número grande -->
  <text x="100" y="115" text-anchor="middle" fill="#fff"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="56" font-weight="900">7</text>

  <!-- texto curva inferior -->
  <path id="curve-bottom" d="M 30 102 A 70 70 0 0 0 170 102" fill="none"/>
  <text fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="800" letter-spacing="2.5">
    <textPath xlink:href="#curve-bottom" startOffset="50%" text-anchor="middle">DIAS · DEVOLUÇÃO TOTAL</textPath>
  </text>

  <!-- check de fundo (decorativo) -->
  <path d="M 75 138 L 88 148 L 130 130" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
</svg>
